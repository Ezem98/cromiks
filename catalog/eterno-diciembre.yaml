# =====================================================================
# Eterno Diciembre — Master Catálogo
# Primer álbum de Replay: Argentina Campeón del Mundo 2022
# =====================================================================
#
# Este archivo es la fuente única de verdad del contenido del álbum.
# Define los 205 cromos con su metadata, rareza y fuentes a procesar.
#
# Estructura de cada cromo:
#   - id: slug único (kebab-case)
#   - name: nombre display
#   - page: id de la página a la que pertenece
#   - rarity: common | uncommon | rare | epic | legendary
#   - card_number: 1-205, único en el álbum
#   - description: copy corto para el detalle del cromo
#   - content: definición de assets a procesar
#       photo: { type, source_url, capture_frame? }
#       video: { type, source_url, start, duration } (rare+ solo)
#       audio: { source_url, start, duration } (cromos de audio)
#       relator_clip: { source_url, start, duration, relator } (epic+ solo)
#   - metadata: contexto del momento
#
# Estados de content:
#   - source: "TODO" → no se obtuvo aún
#   - source: "wikimedia" → fuente libre identificada
#   - source: "youtube" → URL de YouTube a procesar con yt-dlp
#   - source: "self-capture" → captura propia del video del partido
#
# Tipos de processing:
#   - video_capture: tomar foto desde frame específico del video
#   - extract: descargar video/audio y recortar segmento
#   - official: foto oficial pública (Wikipedia, Commons)
#
# =====================================================================

meta:
  album_id: "eterno-diciembre"
  album_name: "Eterno Diciembre"
  album_subtitle: "Argentina Campeón del Mundo 2022"
  total_cards: 205
  language: "es-AR"
